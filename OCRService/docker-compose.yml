version: '3.8'

services:
  paddleocr-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paddleocr-service
    ports:
      - "8868:8868"
    environment:
      - USE_GPU=false
      - LANG=ch
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - paddleocr_models:/root/.paddleocr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8868/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  paddleocr_models:
    driver: local