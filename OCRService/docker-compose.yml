version: '3.8'

services:
  easyocr-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyocr-service
    ports:
      - "8868:8868"
    environment:
      - USE_GPU=false
      - LANG=ch_sim,en
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - easyocr_models:/root/.EasyOCR
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8868/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G

volumes:
  easyocr_models:
    driver: local